openapi: 3.1.0
info:
  title: AI-DSS API
  description: AI-powered decision support system — recommends AI tools to SME e-commerce
    operators based on their operational profile.
  version: 0.1.0
paths:
  /api/recommend:
    post:
      tags:
      - recommendations
      summary: Generate AI tool recommendations for a company
      operationId: recommend_api_recommend_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionnaireRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/catalog:
    get:
      tags:
      - catalog
      summary: List all AI tool capabilities in the catalog
      operationId: get_catalog_api_catalog_get
      parameters:
      - name: browse_category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          description: Filter by library browse category (e.g. sales_crm)
          title: Browse Category
        description: Filter by library browse category (e.g. sales_crm)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/feedback:
    post:
      tags:
      - feedback
      summary: Submit feedback for a recommendation
      operationId: submit_feedback_api_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/register:
    post:
      tags:
      - auth
      summary: Create a new user account
      operationId: register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/login:
    post:
      tags:
      - auth
      summary: Authenticate and get tokens
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/refresh:
    post:
      tags:
      - auth
      summary: Get new access token using refresh token
      operationId: refresh_api_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/logout:
    post:
      tags:
      - auth
      summary: Revoke refresh token (logout)
      operationId: logout_api_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Get current user profile
      operationId: get_me_api_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
      - HTTPBearer: []
    patch:
      tags:
      - auth
      summary: Update profile preferences (language, marketing opt-in)
      operationId: update_me_api_auth_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/auth/{provider}/authorize:
    get:
      tags:
      - auth-oauth
      summary: Redirect to OAuth provider
      operationId: oauth_authorize_api_auth__provider__authorize_get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/{provider}/callback:
    get:
      tags:
      - auth-oauth
      summary: OAuth callback — exchange code for tokens
      operationId: oauth_callback_api_auth__provider__callback_get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      - name: code
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Code
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      - name: error
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/providers:
    get:
      tags:
      - auth-oauth
      summary: List enabled OAuth providers
      operationId: list_providers_api_auth_providers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/me/recommendations:
    get:
      tags:
      - user
      summary: Recommendation history for the authenticated user
      operationId: get_recommendation_history_api_me_recommendations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationHistoryResponse'
      security:
      - HTTPBearer: []
  /api/me/recommendations/{session_id}:
    get:
      tags:
      - user
      summary: Full snapshot of one past assessment (for re-viewing results)
      operationId: get_assessment_detail_api_me_recommendations__session_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - user
      summary: Delete one assessment (session + recommendation + feedback)
      operationId: delete_assessment_api_me_recommendations__session_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/me/saved-tools:
    get:
      tags:
      - user
      summary: List the authenticated user's saved tools
      operationId: list_saved_tools_api_me_saved_tools_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedToolListResponse'
      security:
      - HTTPBearer: []
    post:
      tags:
      - user
      summary: Bookmark a capability for the authenticated user
      operationId: save_tool_api_me_saved_tools_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedToolRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedToolItem'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/me/saved-tools/{capability_id}:
    delete:
      tags:
      - user
      summary: Remove a saved tool for the authenticated user
      operationId: delete_saved_tool_api_me_saved_tools__capability_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: capability_id
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: ^[a-z0-9_]+$
          title: Capability Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/me/export:
    get:
      tags:
      - user
      summary: Export all user data
      operationId: export_user_data_api_me_export_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportResponse'
      security:
      - HTTPBearer: []
  /api/me:
    delete:
      tags:
      - user
      summary: Delete account
      operationId: delete_account_api_me_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
      security:
      - HTTPBearer: []
  /api/admin/stats:
    get:
      tags:
      - admin
      summary: Admin dashboard stats
      operationId: get_stats_api_admin_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatsResponse'
      security:
      - HTTPBearer: []
  /api/admin/capabilities:
    get:
      tags:
      - admin
      summary: List all capabilities with product counts
      operationId: list_capabilities_api_admin_capabilities_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CapabilityResponse'
                type: array
                title: Response List Capabilities Api Admin Capabilities Get
      security:
      - HTTPBearer: []
    post:
      tags:
      - admin
      summary: Create or update a capability
      operationId: upsert_capability_api_admin_capabilities_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Upsert Capability Api Admin Capabilities Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/admin/products:
    post:
      tags:
      - admin
      summary: Create or update a product
      operationId: upsert_product_api_admin_products_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Upsert Product Api Admin Products Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/admin/capabilities/{capability_id}:
    delete:
      tags:
      - admin
      summary: Delete a capability and its products
      operationId: delete_capability_api_admin_capabilities__capability_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: capability_id
        in: path
        required: true
        schema:
          type: string
          title: Capability Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/translations:
    get:
      tags:
      - translations
      summary: List stored translations for a locale
      operationId: list_translations_api_translations_get
      security:
      - HTTPBearer: []
      parameters:
      - name: locale
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 2
            maxLength: 10
          - type: 'null'
          description: e.g. 'de'
          title: Locale
        description: e.g. 'de'
      - name: entity_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          description: e.g. 'capability', 'ui'
          title: Entity Type
        description: e.g. 'capability', 'ui'
      - name: accept-language
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Accept-Language
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/contact:
    post:
      tags:
      - contact
      summary: Submit a consulting inquiry (Work With Us)
      operationId: submit_contact_api_contact_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSubmission'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/export/validate:
    post:
      tags:
      - export-analyser
      summary: Export Validate
      operationId: export_validate_api_export_validate_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_export_validate_api_export_validate_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/export/analyse:
    post:
      tags:
      - export-analyser
      summary: Export Analyse
      operationId: export_analyse_api_export_analyse_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_export_analyse_api_export_analyse_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataInsight'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/export/apply:
    post:
      tags:
      - export-analyser
      summary: Export Apply
      operationId: export_apply_api_export_apply_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/health:
    get:
      tags:
      - system
      summary: Engine status and catalog info
      operationId: health_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/questions:
    get:
      tags:
      - questionnaire
      summary: Question schema for dynamic form rendering
      operationId: get_questions_api_questions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Questions Api Questions Get
components:
  schemas:
    AdminStatsResponse:
      properties:
        capabilities_count:
          type: integer
          title: Capabilities Count
        products_count:
          type: integer
          title: Products Count
        domains:
          items:
            type: string
          type: array
          title: Domains
        users_count:
          type: integer
          title: Users Count
        sessions_count:
          type: integer
          title: Sessions Count
      type: object
      required:
      - capabilities_count
      - products_count
      - domains
      - users_count
      - sessions_count
      title: AdminStatsResponse
    ApplyRequest:
      properties:
        insight:
          $ref: '#/components/schemas/DataInsight'
        override_questionnaire:
          type: boolean
          title: Override Questionnaire
          description: If true, high-confidence suggested pain flags are returned
            for application to the assessment (user-confirmed).
          default: false
      type: object
      required:
      - insight
      title: ApplyRequest
    ApplyResponse:
      properties:
        bottleneck_enrichment:
          type: string
          title: Bottleneck Enrichment
        data_readiness_contribution:
          anyOf:
          - type: number
          - type: 'null'
          title: Data Readiness Contribution
        pain_flags_to_apply:
          additionalProperties:
            type: number
          type: object
          title: Pain Flags To Apply
        note:
          type: string
          title: Note
      type: object
      required:
      - bottleneck_enrichment
      - pain_flags_to_apply
      - note
      title: ApplyResponse
    AssessmentDetailResponse:
      properties:
        session_id:
          type: string
          title: Session Id
        recommendation_id:
          type: string
          title: Recommendation Id
        company_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Company Name
        country:
          anyOf:
          - type: string
          - type: 'null'
          title: Country
        tier:
          type: string
          title: Tier
        pipeline_used:
          type: string
          title: Pipeline Used
        llm_available:
          type: boolean
          title: Llm Available
        processing_time_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Processing Time Ms
        created_at:
          type: string
          title: Created At
        ai_disclosure:
          type: string
          title: Ai Disclosure
        recommendations:
          items:
            $ref: '#/components/schemas/RecommendationItem'
          type: array
          title: Recommendations
      type: object
      required:
      - session_id
      - recommendation_id
      - tier
      - pipeline_used
      - llm_available
      - created_at
      - ai_disclosure
      - recommendations
      title: AssessmentDetailResponse
    AuthResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        refresh_token:
          type: string
          title: Refresh Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        expires_in:
          type: integer
          title: Expires In
          default: 1800
        user:
          $ref: '#/components/schemas/UserResponse'
      type: object
      required:
      - access_token
      - refresh_token
      - user
      title: AuthResponse
    Body_export_analyse_api_export_analyse_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
        language_hint:
          anyOf:
          - type: string
          - type: 'null'
          title: Language Hint
      type: object
      required:
      - file
      title: Body_export_analyse_api_export_analyse_post
    Body_export_validate_api_export_validate_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
      type: object
      required:
      - file
      title: Body_export_validate_api_export_validate_post
    CapabilityCreate:
      properties:
        capability_id:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[a-z_]+$
          title: Capability Id
        name:
          type: string
          maxLength: 255
          minLength: 1
          title: Name
        domain:
          type: string
          maxLength: 100
          minLength: 1
          title: Domain
        description:
          type: string
          title: Description
          default: ''
        use_case_category:
          type: string
          title: Use Case Category
          default: ''
        task_type_target:
          type: string
          title: Task Type Target
          default: ''
        bottleneck_keywords:
          items:
            type: string
          type: array
          title: Bottleneck Keywords
          default: []
        works_without_data:
          type: boolean
          title: Works Without Data
          default: true
        required_data_types:
          items:
            type: string
          type: array
          title: Required Data Types
          default: []
        min_history_months_gate:
          type: integer
          title: Min History Months Gate
          default: 0
        min_technical_capability:
          type: integer
          title: Min Technical Capability
          default: 1
        mapped_pain_points:
          items:
            type: string
          type: array
          title: Mapped Pain Points
          default: []
        primary_outcome:
          type: string
          title: Primary Outcome
          default: ''
        secondary_outcomes:
          items:
            type: string
          type: array
          title: Secondary Outcomes
          default: []
        time_to_value_weeks_min:
          anyOf:
          - type: integer
          - type: 'null'
          title: Time To Value Weeks Min
        time_to_value_weeks_max:
          anyOf:
          - type: integer
          - type: 'null'
          title: Time To Value Weeks Max
      type: object
      required:
      - capability_id
      - name
      - domain
      title: CapabilityCreate
    CapabilityResponse:
      properties:
        capability_id:
          type: string
          title: Capability Id
        name:
          type: string
          title: Name
        domain:
          type: string
          title: Domain
        description:
          type: string
          title: Description
        mapped_pain_points:
          items:
            type: string
          type: array
          title: Mapped Pain Points
        products_count:
          type: integer
          title: Products Count
      type: object
      required:
