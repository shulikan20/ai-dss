name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack (classical mode — no 5 GB model download in CI)
        run: PIPELINE_MODE=classical docker compose up postgres api -d --build --wait
        timeout-minutes: 5

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/api/health | python3 -m json.tool

      - name: Smoke test — recommend endpoint
        run: |
          curl -sf -X POST http://localhost:8000/api/recommend \
            -H "Content-Type: application/json" \
            -d @demo_data/sample_tinywonders.json \
            | python3 -m json.tool
          echo "Smoke test passed"

      - name: Smoke test — export validate
        run: |
          curl -sf -X POST http://localhost:8000/api/export/validate \
            -F "file=@demo_data/shopify_orders.csv" \
            | python3 -m json.tool

      - name: Smoke test — demo UI reachable
        run: curl -sf http://localhost:8000/ | grep -q "AI-DSS Demo"

      - name: Tear down
        if: always()
        run: docker compose down -v
