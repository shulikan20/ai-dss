# Hybrid (default):   docker compose up -d --build
# LLM:           PIPELINE_MODE=llm docker compose up -d --build
# Classical:     PIPELINE_MODE=classical docker compose up -d --build
services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     aidss
      POSTGRES_PASSWORD: aidss
      POSTGRES_DB:       aidss
    volumes:
      - aidss-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidss -d aidss"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aidss:aidss@postgres:5432/aidss
      SECRET_KEY: demo-secret-not-for-production
      AIDSS_ENV: development
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      ALLOWED_ORIGINS: "*"
      PIPELINE_MODE: ${PIPELINE_MODE:-hybrid}
      LLM_TIMEOUT_SEC: ${LLM_TIMEOUT_SEC:-300}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 180s

volumes:
  aidss-pg-data:
    driver: local
